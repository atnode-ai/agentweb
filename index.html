<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atnode — Hyperagent Agent Fleet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111820;
    --border: #1e2a38;
    --text: #c8d3df;
    --text-muted: #6b7d93;
    --text-bright: #e8edf3;
    --blue: #4a9eff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    min-height: 100vh;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 40px 80px;
  }

  .org-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.3px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .agent-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .agent-entry {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s;
  }

  .agent-entry:hover {
    border-color: var(--blue);
    background: rgba(74, 158, 255, 0.04);
  }

  .agent-icon {
    font-size: 24px;
    flex-shrink: 0;
  }

  .agent-info { flex: 1; }

  .agent-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 4px;
  }

  .agent-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .agent-arrow {
    color: var(--text-muted);
    font-size: 16px;
    flex-shrink: 0;
    transition: transform 0.15s;
  }

  .agent-entry:hover .agent-arrow {
    transform: translateX(3px);
    color: var(--blue);
  }

  .footer {
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .footer a { color: var(--blue); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .page { padding: 24px 20px 60px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="org-label">Atnode</div>
  <h1>Hyperagent Agent Fleet</h1>

  <div class="agent-list">

    <a class="agent-entry" href="dollar-liquidity-agent/index.html">
      <span class="agent-icon">📡</span>
      <div class="agent-info">
        <div class="agent-name">Dollar-Liquidity Stress Monitor</div>
        <div class="agent-desc">Monitors U.S. dollar-liquidity stress signals across the Fed, Treasury, and foreign central banks. Weekly dashboards with calibrated alert thresholds.</div>
      </div>
      <span class="agent-arrow">→</span>
    </a>

  </div>

  <div class="footer">
    <a href="https://atnode.ai" target="_blank" rel="noopener noreferrer">atnode.ai</a> &middot;
    Built on <a href="https://hyperagent.com" target="_blank" rel="noopener noreferrer">Hyperagent</a>
  </div>

</div>
</body>
</html>
